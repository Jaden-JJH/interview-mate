<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1080" />
  <title>인터뷰메이트 카드뉴스</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap"
    rel="stylesheet"
  />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #0F1C45;
      --accent: #3B82F6;
      --glow:   rgba(59, 130, 246, 0.10);
    }

    html, body {
      width: 1080px;
      height: 1350px;
      overflow: hidden;
      font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .card {
      width: 1080px;
      height: 1350px;
      position: relative;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* 배경 미묘한 glow */
    .bg-glow {
      position: absolute;
      width: 1000px;
      height: 1000px;
      border-radius: 50%;
      background: radial-gradient(circle, var(--glow) 0%, transparent 65%);
      top: -350px;
      right: -250px;
      pointer-events: none;
    }

    /* 좌측 상단 로고 + 브랜드명 */
    .brand {
      position: absolute;
      top: 64px;
      left: 72px;
      display: flex;
      align-items: center;
      gap: 16px;
      z-index: 10;
    }

    .logo {
      width: 72px;
      height: 72px;
      border-radius: 18px;
      object-fit: contain;
      flex-shrink: 0;
    }

    .brand-name {
      font-size: 30px;
      font-weight: 700;
      color: #FFFFFF;
      letter-spacing: -0.5px;
    }

    /* 우측 하단 서비스 링크 */
    .site-url {
      position: absolute;
      bottom: 60px;
      right: 72px;
      font-size: 28px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.85);
      letter-spacing: 0.3px;
      z-index: 10;
      background: color-mix(in srgb, var(--accent) 22%, transparent);
      border: 1.5px solid color-mix(in srgb, var(--accent) 45%, transparent);
      border-radius: 100px;
      padding: 14px 32px;
    }

    /* 중앙 콘텐츠 */
    .content {
      position: relative;
      z-index: 10;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 0 80px;
      gap: 56px;
    }

    .title {
      font-size: 72px;
      font-weight: 900;
      color: #FFFFFF;
      line-height: 1.35;
      letter-spacing: -2px;
      word-break: keep-all;
      overflow-wrap: break-word;
    }

    .body-text {
      font-size: 36px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.68);
      line-height: 1.9;
      letter-spacing: -0.5px;
      word-break: keep-all;
      overflow-wrap: break-word;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
  </style>
</head>
