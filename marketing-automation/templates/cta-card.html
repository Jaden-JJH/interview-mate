<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1080" />
  <title>인터뷰메이트 CTA</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap"
    rel="stylesheet"
  />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/bodymovin/5.12.2/lottie.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #0A1530;
      --accent: #4F8EF7;
      --glow:   rgba(59, 130, 246, 0.12);
    }

    html, body {
      width: 1080px;
      height: 1350px;
      overflow: hidden;
      font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .card {
      width: 1080px;
      height: 1350px;
      position: relative;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .bg-glow {
      position: absolute;
      width: 1100px;
      height: 1100px;
      border-radius: 50%;
      background: radial-gradient(circle, var(--glow) 0%, transparent 65%);
      top: -350px;
      right: -260px;
      pointer-events: none;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: -4px;
    }

    .logo {
      width: 108px;
      height: 108px;
      border-radius: 27px;
      object-fit: contain;
      flex-shrink: 0;
    }

    .brand-name {
      font-size: 60px;
      font-weight: 700;
      color: #FFFFFF;
      letter-spacing: -0.5px;
    }

    /* 전체 콘텐츠 — 세로 flex */
    .content {
      position: relative;
      z-index: 10;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0 80px;
      gap: 36px;
    }

    .lottie-wrap {
      position: relative;
      width: 640px;
      height: 480px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .blur-glow {
      position: absolute;
      width: 1400px;
      height: 1050px;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 0;
      mix-blend-mode: screen;
      object-fit: contain;
    }

    #lottie-alex {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
    }

    .slogan {
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .slogan-line-1 {
      font-size: 56px;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.92);
      letter-spacing: -1.5px;
      line-height: 1.25;
    }

    .slogan-line-2 {
      font-size: 80px;
      font-weight: 900;
      color: #FFFFFF;
      letter-spacing: -2.5px;
      line-height: 1.15;
    }

    /* 하단: 링크 + 로고 */
    .footer {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      margin-top: 8px;
    }

    .cta-link {
      font-size: 40px;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.85);
      letter-spacing: -0.5px;
      white-space: nowrap;
    }

  </style>
</head>
<body>
  <div class="card">
    <div class="bg-glow"></div>

    <div class="content">
      <div class="brand">
        <img class="logo" src="../../public/icon-512.png" alt="인터뷰메이트" />
        <span class="brand-name">인터뷰메이트</span>
      </div>
      <div class="lottie-wrap">
        <img class="blur-glow" src="../../public/lottie/fixed_blur.webp" alt="" />
        <div id="lottie-alex"></div>
      </div>
      <div class="slogan">
        <div class="slogan-line-1">합격에 가까워지는</div>
        <div class="slogan-line-2">가장 빠른 면접 연습</div>
      </div>
      <div class="footer">
        <div class="cta-link">interview-mate.com</div>
      </div>
    </div>
  </div>

  <script>
    const alexConfig = {
      container: document.getElementById('lottie-alex'),
      renderer: 'svg',
      loop: false,
      autoplay: false,
    };
    if (window.__lottieAnimData) {
      alexConfig.animationData = window.__lottieAnimData;
    } else {
      alexConfig.path = '../../public/lottie/alex.json';
    }
    const anim = lottie.loadAnimation(alexConfig);

    window.__lottieReady = false;
    anim.addEventListener('DOMLoaded', () => {
      anim.goToAndStop(300, true);
      window.__lottieReady = true;
    });
    anim.addEventListener('data_failed', () => {
      window.__lottieReady = true;
    });
  </script>
</body>
</html>
