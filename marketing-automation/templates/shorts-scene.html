<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1920px;
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    color: #fff;
  }

  .bg-hook    { background: linear-gradient(160deg, #0A1530 0%, #1a2f5a 50%, #0A1530 100%); }
  .bg-insight { background: linear-gradient(160deg, #0f1d3d 0%, #1e3a6e 50%, #0f1d3d 100%); }
  .bg-tip     { background: linear-gradient(160deg, #1a0a30 0%, #3d1a6e 50%, #1a0a30 100%); }
  .bg-stat    { background: linear-gradient(160deg, #301a0a 0%, #6e3a1a 50%, #301a0a 100%); }
  .bg-cta     { background: linear-gradient(160deg, #0A1530 0%, #162952 50%, #0A1530 100%); }

  .container {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 80px 60px;
    text-align: center;
    position: relative;
  }

  .scene-indicator {
    position: absolute;
    top: 60px;
    display: flex;
    gap: 12px;
  }
  .dot {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: rgba(255,255,255,0.25);
  }
  .dot.active { background: #fff; }

  .headline {
    font-size: 72px;
    font-weight: 800;
    line-height: 1.3;
    letter-spacing: -1px;
    max-width: 900px;
    word-break: keep-all;
    text-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }

  .hook .headline { font-size: 84px; color: #FFD700; }
  .cta .headline { font-size: 64px; }

  .divider {
    width: 120px;
    height: 4px;
    background: rgba(255,255,255,0.4);
    margin: 40px 0;
    border-radius: 2px;
  }

  .narration-hint {
    font-size: 36px;
    font-weight: 400;
    line-height: 1.6;
    color: rgba(255,255,255,0.75);
    max-width: 850px;
    word-break: keep-all;
  }

  .brand {
    position: absolute;
    bottom: 80px;
    font-size: 28px;
    font-weight: 600;
    color: rgba(255,255,255,0.35);
    letter-spacing: 2px;
  }

  .cta-link {
    margin-top: 50px;
    padding: 28px 64px;
    background: #4A90D9;
    border-radius: 50px;
    font-size: 40px;
    font-weight: 700;
    color: #fff;
    text-decoration: none;
  }
</style>
</head>
<body class="bg-{{visualCue}}">
  <div class="container {{visualCue}}">
    <div class="scene-indicator">
      <div class="dot {{dot1}}"></div>
      <div class="dot {{dot2}}"></div>
      <div class="dot {{dot3}}"></div>
      <div class="dot {{dot4}}"></div>
    </div>

    <div class="headline">{{headline}}</div>
    <div class="divider"></div>
    <div class="narration-hint">{{narrationHint}}</div>

    {{#if isCta}}
    <div class="cta-link">interview-mate.com</div>
    {{/if}}

    <div class="brand">INTERVIEW MATE</div>
  </div>
</body>
</html>
